<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Live2D Character Renderer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: transparent; overflow: hidden; }
    #live2d-canvas { width: 1080px; height: 1920px; display: block; }
    #status { position: fixed; top: 10px; left: 10px; color: #0f0; font-family: monospace; font-size: 12px; z-index: 999; }
  </style>
</head>
<body>
  <canvas id="live2d-canvas" width="1080" height="1920"></canvas>
  <div id="status">Ready</div>

  <!-- Cubism Web SDK (pixi-live2d-display) - CDN -->
  <script src="https://cdn.jsdelivr.net/npm/pixi.js@7.3.2/dist/pixi.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/index.min.js"></script>

  <script>
    /**
     * Live2D Web Renderer
     *
     * 通信协议（WebSocket JSON）：
     * → { "type": "load_model", "model_path": "xxx.model3.json", "role": "female_lead" }
     * → { "type": "set_expression", "expression": "happy" }
     * → { "type": "play_motion", "group": "idle", "index": 0 }
     * → { "type": "set_lipsync", "value": 0.8 }
     * → { "type": "start_recording", "fps": 25, "duration": 3.0 }
     * → { "type": "stop_recording" }
     * ← { "type": "status", "status": "ready|recording|done", "message": "..." }
     * ← { "type": "frame_data", "frame_index": 0, "data": "base64..." }
     */

    const canvas = document.getElementById('live2d-canvas');
    const statusEl = document.getElementById('status');
    let app = null;
    let model = null;
    let ws = null;
    let recording = false;
    let lipSyncValue = 0;

    function log(msg) {
      statusEl.textContent = msg;
      console.log('[Live2D]', msg);
    }

    async function initPixi() {
      app = new PIXI.Application({
        view: canvas,
        width: 1080,
        height: 1920,
        backgroundAlpha: 0,
        antialias: true,
        resolution: 1,
      });
      log('PIXI initialized');
    }

    async function loadModel(modelPath) {
      if (model) {
        app.stage.removeChild(model);
        model.destroy();
        model = null;
      }
      try {
        model = await PIXI.live2d.Live2DModel.from(modelPath);
        model.anchor.set(0.5, 0.5);
        model.x = canvas.width / 2;
        model.y = canvas.height * 0.6;
        const scale = Math.min(
          (canvas.width * 0.8) / model.width,
          (canvas.height * 0.6) / model.height
        );
        model.scale.set(scale);
        app.stage.addChild(model);
        log(`Model loaded: ${modelPath}`);
        return true;
      } catch (e) {
        log(`Model load failed: ${e.message}`);
        return false;
      }
    }

    function setExpression(name) {
      if (!model) return;
      try {
        model.expression(name);
        log(`Expression: ${name}`);
      } catch (e) {
        log(`Expression failed: ${e.message}`);
      }
    }

    function playMotion(group, index) {
      if (!model) return;
      try {
        model.motion(group, index);
        log(`Motion: ${group}[${index}]`);
      } catch (e) {
        log(`Motion failed: ${e.message}`);
      }
    }

    function setLipSync(value) {
      lipSyncValue = Math.max(0, Math.min(1, value));
      if (model && model.internalModel) {
        try {
          const coreModel = model.internalModel.coreModel;
          if (coreModel && coreModel.setParameterValueById) {
            coreModel.setParameterValueById('ParamMouthOpenY', lipSyncValue);
          }
        } catch (e) {}
      }
    }

    function connectWebSocket(port) {
      const url = `ws://127.0.0.1:${port}`;
      ws = new WebSocket(url);
      ws.onopen = () => {
        log(`WebSocket connected: ${url}`);
        ws.send(JSON.stringify({ type: 'status', status: 'ready' }));
      };
      ws.onmessage = async (event) => {
        try {
          const cmd = JSON.parse(event.data);
          await handleCommand(cmd);
        } catch (e) {
          log(`Command error: ${e.message}`);
        }
      };
      ws.onclose = () => log('WebSocket disconnected');
      ws.onerror = (e) => log(`WebSocket error`);
    }

    async function handleCommand(cmd) {
      switch (cmd.type) {
        case 'load_model':
          const ok = await loadModel(cmd.model_path);
          sendStatus(ok ? 'model_loaded' : 'model_failed');
          break;
        case 'set_expression':
          setExpression(cmd.expression);
          sendStatus('expression_set');
          break;
        case 'play_motion':
          playMotion(cmd.group || 'idle', cmd.index || 0);
          sendStatus('motion_playing');
          break;
        case 'set_lipsync':
          setLipSync(cmd.value || 0);
          break;
        case 'capture_frame':
          const dataUrl = canvas.toDataURL('image/png');
          ws.send(JSON.stringify({
            type: 'frame_data',
            frame_index: cmd.frame_index || 0,
            data: dataUrl,
          }));
          break;
        case 'ping':
          sendStatus('pong');
          break;
        default:
          log(`Unknown command: ${cmd.type}`);
      }
    }

    function sendStatus(status, extra) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'status', status, ...extra }));
      }
    }

    // 初始化
    initPixi().then(() => {
      // 从 URL 参数获取 WebSocket 端口
      const params = new URLSearchParams(window.location.search);
      const wsPort = params.get('ws_port');
      if (wsPort) {
        connectWebSocket(wsPort);
      }
      log('Live2D Renderer Ready');
    });
  </script>
</body>
</html>
